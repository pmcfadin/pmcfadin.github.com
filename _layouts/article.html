---
layout: default
---

<article class="article-page">
    <div class="article-hero">
        <div class="container">
            <h1 class="article-title">{{ page.title }}</h1>
            <div class="article-meta">
                <span><i class="far fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}</span>
                {% if page.category %}
                <span><i class="far fa-folder"></i> {{ page.category }}</span>
                {% endif %}
                {% if page.reading_time %}
                <span><i class="far fa-clock"></i> {{ page.reading_time }} min read</span>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="article-body">
        <div class="container">
            <div class="article-content">
                {{ content }}
            </div>

            <div class="article-footer">
                <div class="article-share">
                    <h4>Share this article</h4>
                    <div class="share-buttons">
                        <a href="https://bsky.app/intent/compose?text={{ page.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener">
                            <i class="fab fa-bluesky"></i>
                        </a>
                        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url }}" target="_blank" rel="noopener">
                            <i class="fab fa-linkedin"></i>
                        </a>
                    </div>
                </div>

                <div class="back-to-articles">
                    <a href="{{ '/#articles' | relative_url }}"><i class="fas fa-arrow-left"></i> Back to Articles</a>
                </div>
            </div>
        </div>
    </div>
</article>

<style>
.article-page {
    margin-top: 56px;
    min-height: calc(100vh - 56px);
}

.article-hero {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 4rem 2rem 3rem;
}

.article-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 600;
    margin-bottom: 1rem;
    max-width: 800px;
    color: var(--text-primary);
    line-height: 1.15;
}

.article-page .article-meta {
    display: flex;
    gap: 1.5rem;
    font-size: 0.9rem;
    color: var(--text-muted);
}

.article-page .article-meta i {
    margin-right: 0.3rem;
    color: var(--accent-dim);
}

.article-body {
    padding: 3.5rem 2rem 4rem;
}

.article-content {
    max-width: 800px;
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text-secondary);
}

.article-content h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 600;
    margin: 2.5rem 0 1rem;
    color: var(--text-primary);
}

.article-content h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 600;
    margin: 2rem 0 0.75rem;
    color: var(--text-primary);
}

.article-content p {
    margin-bottom: 1.5rem;
}

.article-content a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(201, 162, 77, 0.3);
    transition: text-decoration-color 0.2s ease;
}

.article-content a:hover {
    text-decoration-color: var(--accent);
}

.article-content code {
    background: var(--bg-elevated);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    color: var(--accent-light);
    border: 1px solid var(--border);
}

.article-content pre {
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 1.5rem;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 2rem 0;
    border: 1px solid var(--border);
}

.article-content pre code {
    background: transparent;
    padding: 0;
    color: var(--text-primary);
    border: none;
}

.article-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1.5rem;
    margin: 2rem 0;
    font-style: italic;
    color: var(--text-muted);
}

.article-content ul, .article-content ol {
    margin-bottom: 1.5rem;
    padding-left: 1.75rem;
}

.article-content li {
    margin-bottom: 0.5rem;
}

.article-content strong {
    color: var(--text-primary);
    font-weight: 600;
}

.article-footer {
    max-width: 800px;
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.article-share h4 {
    margin-bottom: 0.75rem;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.share-buttons {
    display: flex;
    gap: 0.75rem;
}

.share-buttons a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-secondary);
    transition: all 0.2s ease;
}

.share-buttons a:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--text-on-accent);
    transform: translateY(-2px);
}

.back-to-articles a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: gap 0.2s ease;
}

.back-to-articles a:hover {
    gap: 0.75rem;
    color: var(--accent-light);
}

@media (max-width: 768px) {
    .article-title {
        font-size: 2rem;
    }

    .article-page .article-meta {
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .article-footer {
        flex-direction: column;
        gap: 2rem;
        align-items: flex-start;
    }
}
</style>
